loop:
  interval_seconds: 3.0

window:
  process_name: "LastWar.exe"
  title_contains: "Last War"
  client_width: 1920
  client_height: 1080
  min_client_width: 1024
  min_client_height: 728
  resize_enabled: false
  force_foreground_each_cycle: true
  f11_settle_seconds: 1.5
  resize_settle_seconds: 0.5

matching:
  images_dir: "images/templates"
  thresholds:
    base: 0.68
    world: 0.68
    handshake: 0.78
    excavator: 0.62
    station: 0.68
    station_zoomed_out: 0.78
    ur_fragment: 0.86
    cargo_refresh_button: 0.72
    cargo_power_icon: 0.78
  regions:
    handshake: [0.72, 0.58, 0.99, 0.92]
    excavator: [0.34, 0.68, 0.66, 0.98]
    station: [0.00, 0.00, 0.60, 0.60]
    station_zoomed_out_icon: [0.00, 0.00, 0.35, 0.35]
    station_zoomed_out_full: [0.00, 0.00, 0.40, 0.40]
    ur_fragment: [0.00, 0.72, 0.75, 1.00]
    cargo_refresh_button: [0.58, 0.00, 0.72, 0.12]
    cargo_power_icon: [0.08, 0.64, 0.50, 0.90]

# 1 资源
ocr:
  enabled: true
  stats_enabled: true
  language: "ch"
  use_gpu: false
  interval_seconds: 60.0
  regions:
    level: [8, 38, 78, 94]
    stamina: [0, 84, 92, 134]
    food: [72, 0, 218, 50]
    iron: [208, 0, 346, 50]
    gold: [330, 0, 470, 50]
    power: [80, 44, 292, 112]
    diamonds: [1788, 0, 1918, 56]

# 2 同盟帮助
cooldowns:
  handshake_seconds: 3.0
  excavator_alert_seconds: 60.0

# 3 挖掘机
sounds:
  handshake_enabled: true
  excavator_enabled: true
  high_value_truck_enabled: true

event_log:
  enabled: true
  directory: "logs/events"

openclaw:
  enabled: true
  startup_enabled: false
  excavator_enabled: true
  mode: "cli"
  url: "http://127.0.0.1:18789/message"
  headers:
    Content-Type: "application/json"
  payload_template:
    message: "{message}"
    source: "lastwar-bot"
    event: "{event}"
  cli_executable: '%APPDATA%\npm\openclaw.cmd'
  cli_agent: "main"
  cli_target: "qqbot:c2c:{OPEN_ID}"
  cli_command:
    - "{cli_executable}"
    - "agent"
    - "--agent"
    - "{cli_agent}"
    - "--deliver"
    - "--message"
    - "{message}"
    - "--to"
    - "{cli_target}"

# 4 货车
cargo:
  min_target_power_m: 15.0
  ur_fragment_alert_count: 2
  auto_share_enabled: true
  max_refresh_attempts: 9999
  inspection_wait_seconds: 0.3
  ur_confirm_interval_seconds: 0.3
  share_wait_seconds: 0.5
  share_confirm_wait_seconds: 0.5
  refresh_wait_seconds: 1.2
  enter_wait_seconds: 2
  enter_retry_count: 2
  sample_attempts: 2
  sample_interval_seconds: 0.3
  empty_result_retry_rounds: 2
  refresh_button_x_ratio: 0.6404
  refresh_button_y_ratio: 0.0455

debug:
  enabled: true
  log_environment_once: true
  log_cycle_state: false
  log_failed_detections: true
  log_ocr_regions: false
