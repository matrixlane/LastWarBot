loop:
  interval_seconds: 3.0

window:
  process_name: "LastWar.exe"
  title_contains: "Last War"
  client_width: 1920
  client_height: 1080
  min_client_width: 1024
  min_client_height: 728
  resize_enabled: false
  force_foreground_each_cycle: true
  f11_settle_seconds: 1.5
  resize_settle_seconds: 0.5

matching:
  images_dir: "images/templates"
  thresholds:
    base: 0.68
    world: 0.68
    alliance_help_icon: 0.78
    dig_up_treasure: 0.62
    station: 0.68
    station_zoomed_out: 0.78
    ur_shard: 0.86
    truck_refresh_button: 0.72
    truck_power_icon: 0.78
  regions:
    alliance_help_icon: [0.72, 0.58, 0.99, 0.92]
    dig_up_treasure: [0.34, 0.68, 0.66, 0.98]
    station: [0.00, 0.00, 0.60, 0.60]
    station_zoomed_out_icon: [0.00, 0.00, 0.35, 0.35]
    station_zoomed_out_full: [0.00, 0.00, 0.40, 0.40]
    ur_shard: [0.00, 0.72, 0.75, 1.00]
    truck_refresh_button: [0.58, 0.00, 0.72, 0.12]
    truck_power_icon: [0.08, 0.32, 0.44, 0.64]

# 1 Startup
startup:
  openclaw_message_enabled: false
  
# 2 Player Info
player_info:
  enabled: true
  language: "ch"
  use_gpu: false
  interval_seconds: 60.0
  regions:
    level: [8, 38, 78, 94]
    stamina: [0, 84, 92, 134]
    food: [72, 0, 246, 54]
    iron: [214, 0, 402, 54]
    gold: [366, 0, 556, 54]
    power: [80, 44, 292, 112]
    diamonds: [1788, 0, 1918, 56]

# 3 Alliance Help
alliance_help:
  click_cooldown_seconds: 3.0
  sound_enabled: true

# 4 DigUpTreasure
dig_up_treasure:
  alert_cooldown_seconds: 60.0
  sound_enabled: true
  openclaw_message_enabled: true

# 5 Truck
truck:
  min_target_power_m: 15.0
  min_ur_shards: 2
  alert_enabled: true
  alert_min_ur_shards: 3
  r4r5_share:
    enabled: true
    min_ur_shards: 4
  alliance_share:
    enabled: true
    min_ur_shards: 3
  max_refresh_attempts: 999
  inspection_wait_seconds: 0.2
  ur_shard_confirm_interval_seconds: 0.2
  share_wait_seconds: 0.5
  share_confirm_wait_seconds: 0.5
  refresh_wait_seconds: 1.0
  enter_wait_seconds: 2
  enter_retry_count: 2
  sample_attempts: 1
  sample_interval_seconds: 0.2
  empty_result_retry_rounds: 2
  refresh_button_x_ratio: 0.6404
  refresh_button_y_ratio: 0.0455

openclaw:
  enabled: false
  mode: "cli"
  url: "http://127.0.0.1:18789/message"
  headers:
    Content-Type: "application/json"
  payload_template:
    message: "{message}"
    source: "lastwar-bot"
    event: "{event}"
  cli_executable: "%APPDATA%\\npm\\openclaw.cmd"
  cli_agent: "main"
  cli_target: "qqbot:c2c:{OPEN_ID}"
  cli_command:
    - "{cli_executable}"
    - "agent"
    - "--agent"
    - "{cli_agent}"
    - "--deliver"
    - "--message"
    - "{message}"
    - "--to"
    - "{cli_target}"

event_log:
  enabled: true
  directory: "logs/events"

debug:
  enabled: false
  log_environment_once: true
  log_cycle_state: false
  log_failed_detections: true
  log_ocr_regions: false
